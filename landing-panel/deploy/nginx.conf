# landing-panel SPA — static nginx behind the shared Traefik (websecure -> :80 here).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               application/xml text/xml image/svg+xml application/wasm font/woff2;

    # Hashed build assets are content-addressed by Vite — cache them hard.
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Never cache the entry document, so a new deploy is picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate";
    }

    # SPA history fallback — unknown paths serve the app shell so the React router can
    # handle deep links and the OIDC redirect routes (/auth/callback, /auth/silent).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
