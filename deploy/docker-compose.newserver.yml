name: mabhas19

# Full self-contained production stack for the NEW server (185.206.94.116, "same box as
# kurdvahedgas-web"). Unlike docker-compose.server.edge.yml (offline Iran box, own Traefik,
# transferred images) this server has normal internet, so images are BUILT FROM SOURCE here
# and it ATTACHES to the box's pre-existing SHARED Traefik v2.11:
#   * external network "traefik"; cert resolver "myresolver" = ACME DNS-01 via ArvanCloud.
#   * DNS-01 mints REAL Let's Encrypt certs even though the hosts sit behind the ArvanCloud
#     CDN (no inbound challenge needed). Origin therefore serves valid HTTPS on :443
#     -> set the ArvanCloud SSL mode to "Full" and origin port 443 for every host.
#   * Router/service names (m19web/m19api/m19auth/m19s3) and container_names are unique to
#     this app so it never disturbs kurdvahedgas-web / sms-service / v2ray on the same box.
#
#   docker compose -f deploy/docker-compose.newserver.yml --env-file deploy/.env build --no-cache
#   docker compose -f deploy/docker-compose.newserver.yml --env-file deploy/.env up -d --force-recreate

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mabhas19-sqlserver
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      MSSQL_PID: "Express"   # Express self-caps at ~1.4 GB buffer pool — fits the 4 GB box
    volumes:
      - mssqldata:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "(/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' 2>/dev/null) || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    networks: [internal]

  minio:
    image: minio/minio:latest
    container_name: mabhas19-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/data
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      # S3 API host — presigned report URLs are issued against this host, so it must be public.
      - "traefik.http.routers.m19s3.rule=Host(`${MINIO_DOMAIN}`)"
      - "traefik.http.routers.m19s3.entrypoints=websecure"
      - "traefik.http.routers.m19s3.tls.certresolver=myresolver"
      - "traefik.http.routers.m19s3.service=m19s3"
      - "traefik.http.services.m19s3.loadbalancer.server.port=9000"
    networks: [internal, traefik]

  auth:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.auth
    image: mabhas19-auth:newserver
    container_name: mabhas19-auth
    restart: unless-stopped
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Mabhas19AuthDb: "Server=sqlserver,1433;Database=Mabhas19AuthDb;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;"
      # FarsNezam (نظام مهندسی فارس) external read-only DB — engineer auto-provisioning (empty = disabled).
      ConnectionStrings__FarsNezamDb: "${FARSNEZAM_DB_CONN:-}"
      OpenIddict__SigningCertificatePath: /certs/openiddict.pfx
      OpenIddict__SigningCertificatePassword: ${OPENIDDICT_CERT_PASSWORD}
      Sms__Provider: "${SMS_PROVIDER:-log}"
      Sms__RelayBaseUrl: "https://sms.kurdnezambargh.ir"
      Sms__RelayToken: "${SMS_RELAY_TOKEN:-}"
      Authentication__Google__ClientId: "${GOOGLE_CLIENT_ID:-}"
      Otp__LogCode: "false"
      AdminUser__Email: ${ADMIN_EMAIL}
      AdminUser__Password: ${ADMIN_PASSWORD}
      Clients__Mabhas19Web__Secret: ${MABHAS19_WEB_CLIENT_SECRET}
      Clients__Mabhas19Web__Redirect: "https://${WEB_DOMAIN}/api/auth/callback/mabhas19"
      Clients__Mabhas19Web__PostLogout: "https://${WEB_DOMAIN}"
      Clients__Mabhas19Mobile__Redirect: "mabhas19://auth"
      # plan-web is registered unconditionally by the IdP seeder (a confidential client, so it
      # requires a non-empty secret) even though plan.myceo.ir isn't hosted here.
      Clients__PlanWeb__Secret: ${PLAN_WEB_CLIENT_SECRET}
      Clients__PlanWeb__Redirect: "https://plan.myceo.ir/api/auth/callback/plan"
      # analytics-web public PKCE client (analytic.myceo.ir). Requires ANALYTICS_DOMAIN in deploy/.env;
      # the IdP seeder skips this client when its Redirect is unset (see AuthDbInitialiser.SeedClientsAsync).
      Clients__AnalyticsWeb__Redirect: "https://${ANALYTICS_DOMAIN}/auth/callback"
      Clients__AnalyticsWeb__Silent: "https://${ANALYTICS_DOMAIN}/auth/silent"
      Clients__AnalyticsWeb__PostLogout: "https://${ANALYTICS_DOMAIN}"
      # CORS: let the analytics-web SPA call the IdP discovery/JWKS/token endpoints from the browser.
      Cors__AllowedOrigins__0: "https://${ANALYTICS_DOMAIN}"
    volumes:
      # OpenIddict token-signing PFX (generated by scripts/remote-provision.sh on first deploy).
      - ./certs:/certs:ro
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.m19auth.rule=Host(`${AUTH_DOMAIN}`)"
      - "traefik.http.routers.m19auth.entrypoints=websecure"
      - "traefik.http.routers.m19auth.tls.certresolver=myresolver"
      - "traefik.http.routers.m19auth.service=m19auth"
      - "traefik.http.services.m19auth.loadbalancer.server.port=8080"
    networks: [internal, traefik]

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    image: mabhas19-api:newserver
    container_name: mabhas19-api
    restart: unless-stopped
    depends_on:
      sqlserver:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Mabhas19Db: "Server=sqlserver,1433;Database=Mabhas19Db;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;"
      # FarsNezam external read-only DB — project provisioning + typ list (empty = disabled).
      ConnectionStrings__FarsNezamDb: "${FARSNEZAM_DB_CONN:-}"
      # MinIO is reached via its public host so presigned signatures are valid for browsers.
      Minio__Endpoint: ${MINIO_DOMAIN}
      Minio__AccessKey: ${MINIO_ROOT_USER}
      Minio__SecretKey: ${MINIO_ROOT_PASSWORD}
      Minio__Bucket: ${MINIO_BUCKET}
      Minio__UseSSL: "true"
      # Validates JWTs issued by the central IdP (resolved via ArvanCloud -> this same box).
      Auth__Authority: "https://${AUTH_DOMAIN}"
      ExternalImport__NezamMohandesi__BaseUrl: "${NEZAM_BASE_URL:-}"
      ExternalImport__NezamMohandesi__ApiKey: "${NEZAM_API_KEY:-}"
      # Analytics: FarsNezam read-only DB. NON-EMPTY switches the analytics query engine from the
      # bundled in-memory sample data to the real SQL engine (SqlQueryEngine).
      ConnectionStrings__AnalyticsDb: "${ANALYTICS_DB_CONN:-}"
      # Analytics AI gateway (ArvanCloud, OpenAI-compatible). BaseUrl MUST end in /v1.
      AnalyticsAi__BaseUrl: "${ANALYTICS_AI_BASE_URL:-}"
      AnalyticsAi__ApiKey: "${ANALYTICS_AI_API_KEY:-}"
      AnalyticsAi__Model: "${ANALYTICS_AI_MODEL:-DeepSeek-R1-qwen-7b-awq}"
      # CORS: index 0 (https://mabhas19.myceo.ir) comes from appsettings.json; append the analytics
      # SPA origin as index 1 so the main app's origin is NOT overwritten.
      Cors__AllowedOrigins__1: "https://${ANALYTICS_DOMAIN}"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.m19api.rule=Host(`${API_DOMAIN}`)"
      - "traefik.http.routers.m19api.entrypoints=websecure"
      - "traefik.http.routers.m19api.tls.certresolver=myresolver"
      - "traefik.http.routers.m19api.service=m19api"
      - "traefik.http.services.m19api.loadbalancer.server.port=8080"
    networks: [internal, traefik]

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
      args:
        # Baked at build time into the client bundle. Domains are unchanged from the old server.
        NEXT_PUBLIC_API_BASE: "https://${API_DOMAIN}"
        NEXT_PUBLIC_AUTH_ISSUER: "https://${AUTH_DOMAIN}"
    image: mabhas19-web:newserver
    container_name: mabhas19-web
    restart: unless-stopped
    depends_on: [api]
    environment:
      NEXT_PUBLIC_API_BASE: "https://${API_DOMAIN}"
      # Auth.js (NextAuth v5) OIDC client -> central IdP. Server-side runtime values.
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      AUTH_URL: "https://${WEB_DOMAIN}"
      AUTH_MABHAS19_ISSUER: "https://${AUTH_DOMAIN}"
      AUTH_MABHAS19_ID: "mabhas19-web"
      AUTH_MABHAS19_SECRET: ${MABHAS19_WEB_CLIENT_SECRET}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.m19web.rule=Host(`${WEB_DOMAIN}`)"
      - "traefik.http.routers.m19web.entrypoints=websecure"
      - "traefik.http.routers.m19web.tls.certresolver=myresolver"
      - "traefik.http.routers.m19web.service=m19web"
      - "traefik.http.services.m19web.loadbalancer.server.port=3000"
    # internal: egress + DNS so Auth.js server-side calls reach the IdP (auth.myceo.ir).
    networks: [traefik, internal]

  # analytics-web — the React/Vite analytics SPA (analytic.myceo.ir), served static by nginx.
  analytics-web:
    build:
      context: ..
      dockerfile: analytics-web/deploy/Dockerfile.analytics-web
      args:
        # Baked into the static bundle at build time (PUBLIC values only — never secrets).
        VITE_API_BASE: "https://${API_DOMAIN}"
        VITE_AUTH_AUTHORITY: "https://${AUTH_DOMAIN}"
        VITE_AUTH_MODE: "oidc"
        VITE_AUTH_CLIENT_ID: "analytics-web"
        VITE_AUTH_SCOPE: "openid profile email roles mabhas19.api"
        VITE_USE_MOCK_API: "false"
        # Set ANALYTICS_AI_FE_MODE=mock in .env to ship Ask-AI on the mock until the live gateway is trusted.
        VITE_AI_MODE: "${ANALYTICS_AI_FE_MODE:-gateway}"
    image: mabhas19-analytics-web:newserver
    container_name: mabhas19-analytics-web
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.m19analytics.rule=Host(`${ANALYTICS_DOMAIN}`)"
      - "traefik.http.routers.m19analytics.entrypoints=websecure"
      - "traefik.http.routers.m19analytics.tls.certresolver=myresolver"
      - "traefik.http.routers.m19analytics.service=m19analytics"
      - "traefik.http.services.m19analytics.loadbalancer.server.port=80"
    # Static SPA: all OIDC/API calls run in the browser -> no DB/IdP server-side egress needed.
    networks: [traefik]

volumes:
  mssqldata:
  miniodata:

networks:
  traefik:
    external: true
  internal:
    driver: bridge
