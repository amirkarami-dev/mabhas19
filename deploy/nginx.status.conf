server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # The roadmap data changes often — never let the browser/CDN serve a stale copy.
    location = /roadmap.json {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # Internal tool — keep it out of search engines even though it's basic-auth gated.
    add_header X-Robots-Tag "noindex, nofollow" always;
}
