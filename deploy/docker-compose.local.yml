name: mabhas19-local

# Full stack on localhost (no Traefik/TLS). Build + run:
#   docker compose -f deploy/docker-compose.local.yml up -d --build
# Web:  http://localhost:3000   API: http://localhost:5000/scalar   MinIO console: http://localhost:9001
services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: mabhas19
      POSTGRES_PASSWORD: mabhas19pass
      POSTGRES_DB: Mabhas19Db
    ports:
      - "5432:5432"
    volumes:
      - pgdata_local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mabhas19 -d Mabhas19Db"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata_local:/data

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Mabhas19Db: "Server=postgres;Port=5432;Database=Mabhas19Db;Username=mabhas19;Password=mabhas19pass;"
      Minio__Endpoint: "minio:9000"
      Minio__AccessKey: minioadmin
      Minio__SecretKey: minioadmin
      Minio__Bucket: mabhas19
      Minio__UseSSL: "false"
      Minio__PublicEndpoint: "http://localhost:9000"
      Sms__Token: ""
      Otp__LogCode: "true"
    ports:
      - "5000:8080"

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
      args:
        NEXT_PUBLIC_API_BASE: "http://localhost:5000"
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_BASE: "http://localhost:5000"
    ports:
      - "3000:3000"

volumes:
  pgdata_local:
  miniodata_local:
