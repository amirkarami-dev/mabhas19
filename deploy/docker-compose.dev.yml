name: mabhas19-dev

# Local development dependencies only (Postgres + MinIO). The API/web run on your host.
# Matches src/Web/appsettings.json defaults.  Start:  docker compose -f deploy/docker-compose.dev.yml up -d
services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: Mabhas19Db
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata_dev:/data

volumes:
  pgdata_dev:
  miniodata_dev:
