name: mabhas19-dev

# Local development dependencies only (SQL Server + MinIO). The API/web run on your host.
# Matches src/Web/appsettings.json defaults.  Start:  docker compose -f deploy/docker-compose.dev.yml up -d
services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Mabhas19_Sql#2026"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - mssqldata_dev:/var/opt/mssql

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata_dev:/data

volumes:
  mssqldata_dev:
  miniodata_dev:
